{% set name = "ontologies-stack" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python =3.12
    - openjdk =11
    - ontologies-cbr =0.1.0
    - ontocast =0.3.0

about:
  summary: Meta-package for the Ontologies project stack
  license: LicenseRef-Project-Internal
  description: |
    Convenience meta-package that installs the packaged OntoCast Python tooling and
    the packaged headless Java CBR tooling together.
