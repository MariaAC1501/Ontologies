{% set name = "ontocast" %}
{% set version = "0.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  skip: true  # [win and not x86_64]
  skip: true  # [linux and not x86_64]
  skip: true  # [osx and not arm64]
  skip: true  # [not win and not linux and not osx]

requirements:
  host:
    - python =3.12
    - pip
  run:
    - python =3.12
    - click >=8.1.8
    - hdbscan >=0.8.41
    - httpx >=0.27.0
    - jinja2 >=3.1.6
    - langchain >=0.3.25
    - langchain-core >=0.3.60
    - langchain-experimental >=0.3.4
    - langchain-huggingface >=0.2.0
    - langchain-ollama >=0.3.3
    - langchain-openai >=0.3.17
    - langgraph >=0.2.35
    - lxml >=5.3.0
    - pytz
    - networkx >=3.0
    - owlready2 >=0.47
    - oxrdflib >=0.5.0
    - pydantic >=2.11.9
    - pyld >=2.0.4
    - python-dotenv >=1.0.0,<2
    - pyyaml >=6
    - rapidfuzz >=3.13.0
    - rdflib >=7.1.4
    - rich >=14.0.0
    - uvloop >=0.22.1  # [not win]
    - umap-learn >=0.5.11
    - dataclass-wizard >=0.33.1
    - inquirerpy ==0.3.4
    - mkdocs-gen-files >=0.5.0
    - multiprocess >=0.70.18,<0.71
    - orjson >=3.11.5,<4
    - pandas >=2.3.3
    - rustimport ==1.3.4
    - strenum >=0.4.15
    - watchdog >=6,<7

test:
  commands:
    - ontocast --help
    - cmp-states --help
    - python -c "import ontocast; import ontocast.cli.serve"

about:
  summary: Agentic ontology and knowledge graph co-generation
  home: https://github.com/growgraph/ontocast
  license: Apache-2.0
  description: |
    Conda package for OntoCast using the upstream PyPI wheel plus a small set of
    vendored PyPI-only runtime dependencies. Supported targets in this repo are:
    osx-arm64, linux-64, and win-64.
