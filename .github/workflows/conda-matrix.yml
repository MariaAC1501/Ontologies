name: conda-matrix

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: conda-bld-linux
            conda_root: /home/runner/miniforge3
            env_prefix: /home/runner/miniforge3/envs/ontologies-ci
            shell: bash
          - os: windows-latest
            artifact_name: conda-bld-windows
            conda_root: C:\Miniforge3
            env_prefix: C:\Miniforge3\envs\ontologies-ci
            shell: pwsh
          - os: macos-latest
            artifact_name: conda-bld-macos
            conda_root: /Users/runner/miniforge3
            env_prefix: /Users/runner/miniforge3/envs/ontologies-ci
            shell: bash
    runs-on: ${{ matrix.os }}
    env:
      CONDA_ROOT: ${{ matrix.conda_root }}
      ENV_PREFIX: ${{ matrix.env_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          auto-activate-base: true
          use-mamba: false
          miniforge-variant: Miniforge3
          installation-dir: ${{ matrix.conda_root }}
          channels: conda-forge
          channel-priority: strict

      - name: Install build dependencies
        shell: ${{ matrix.shell }}
        run: conda env update -n base -f environment.yml

      - name: Build local Conda packages on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/build_conda_packages.sh

      - name: Build local Conda packages on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build_conda_packages.ps1

      - name: Upload local conda channel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.CONDA_ROOT }}/conda-bld
          if-no-files-found: error

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: conda-bld-linux
            conda_root: /home/runner/miniforge3
            env_prefix: /home/runner/miniforge3/envs/ontologies-ci
            shell: bash
          - os: windows-latest
            artifact_name: conda-bld-windows
            conda_root: C:\Miniforge3
            env_prefix: C:\Miniforge3\envs\ontologies-ci
            shell: pwsh
          - os: macos-latest
            artifact_name: conda-bld-macos
            conda_root: /Users/runner/miniforge3
            env_prefix: /Users/runner/miniforge3/envs/ontologies-ci
            shell: bash
    runs-on: ${{ matrix.os }}
    env:
      CONDA_ROOT: ${{ matrix.conda_root }}
      ENV_PREFIX: ${{ matrix.env_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          auto-activate-base: true
          use-mamba: false
          miniforge-variant: Miniforge3
          installation-dir: ${{ matrix.conda_root }}
          channels: conda-forge
          channel-priority: strict

      - name: Install build dependencies
        shell: ${{ matrix.shell }}
        run: conda env update -n base -f environment.yml

      - name: Download local conda channel
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.CONDA_ROOT }}/conda-bld

      - name: Create stack environment on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/create_conda_env.sh "$CONDA_ROOT/envs/ontologies-ci"

      - name: Create stack environment on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/create_conda_env.ps1 "$env:CONDA_ROOT\envs\ontologies-ci"

      - name: Smoke test installed CLIs on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          conda run -p "$ENV_PREFIX" ontologies-cbr help
          conda run -p "$ENV_PREFIX" ontocast --help

      - name: Smoke test installed CLIs on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda run -p "$env:ENV_PREFIX" ontologies-cbr help
          conda run -p "$env:ENV_PREFIX" ontocast --help
