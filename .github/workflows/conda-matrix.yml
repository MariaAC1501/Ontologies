name: conda-matrix

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: conda-bld-linux
            conda_root: /home/runner/miniforge3
            shell: bash
            build_script: bash scripts/build_conda_packages.sh
            artifact_path: /home/runner/miniforge3/conda-bld
          - os: windows-latest
            artifact_name: conda-bld-windows
            conda_root: C:\Miniforge3
            shell: pwsh
            build_script: powershell -ExecutionPolicy Bypass -File scripts/build_conda_packages.ps1
            artifact_path: C:\Miniforge3\conda-bld
          - os: macos-latest
            artifact_name: conda-bld-macos
            conda_root: /Users/runner/miniforge3
            shell: bash
            build_script: bash scripts/build_conda_packages.sh
            artifact_path: /Users/runner/miniforge3/conda-bld
    runs-on: ${{ matrix.os }}
    env:
      CONDA_ROOT: ${{ matrix.conda_root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          auto-activate-base: true
          use-mamba: false
          miniforge-variant: Miniforge3
          installation-dir: ${{ matrix.conda_root }}
          channels: conda-forge
          channel-priority: strict

      - name: Install build dependencies
        shell: ${{ matrix.shell }}
        run: conda env update -n base -f environment.yml

      - name: Build local Conda packages
        shell: ${{ matrix.shell }}
        run: ${{ matrix.build_script }}

      - name: Upload local conda channel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: conda-bld-linux
            conda_root: /home/runner/miniforge3
            download_path: /home/runner/miniforge3/conda-bld
            shell: bash
            create_script: bash scripts/create_conda_env.sh "$CONDA_ROOT/envs/ontologies-ci"
            env_prefix: /home/runner/miniforge3/envs/ontologies-ci
            smoke_test: |
              conda run -p "$ENV_PREFIX" ontologies-cbr help
              conda run -p "$ENV_PREFIX" ontocast --help
          - os: windows-latest
            artifact_name: conda-bld-windows
            conda_root: C:\Miniforge3
            download_path: C:\Miniforge3\conda-bld
            shell: pwsh
            create_script: powershell -ExecutionPolicy Bypass -File scripts/create_conda_env.ps1 "$env:CONDA_ROOT\envs\ontologies-ci"
            env_prefix: C:\Miniforge3\envs\ontologies-ci
            smoke_test: |
              conda run -p "$env:ENV_PREFIX" ontologies-cbr help
              conda run -p "$env:ENV_PREFIX" ontocast --help
          - os: macos-latest
            artifact_name: conda-bld-macos
            conda_root: /Users/runner/miniforge3
            download_path: /Users/runner/miniforge3/conda-bld
            shell: bash
            create_script: bash scripts/create_conda_env.sh "$CONDA_ROOT/envs/ontologies-ci"
            env_prefix: /Users/runner/miniforge3/envs/ontologies-ci
            smoke_test: |
              conda run -p "$ENV_PREFIX" ontologies-cbr help
              conda run -p "$ENV_PREFIX" ontocast --help
    runs-on: ${{ matrix.os }}
    env:
      CONDA_ROOT: ${{ matrix.conda_root }}
      ENV_PREFIX: ${{ matrix.env_prefix }}
      DOWNLOAD_PATH: ${{ matrix.download_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          auto-activate-base: true
          use-mamba: false
          miniforge-variant: Miniforge3
          installation-dir: ${{ matrix.conda_root }}
          channels: conda-forge
          channel-priority: strict

      - name: Install build dependencies
        shell: ${{ matrix.shell }}
        run: conda env update -n base -f environment.yml

      - name: Download local conda channel
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.download_path }}

      - name: Create stack environment from local channel
        shell: ${{ matrix.shell }}
        run: ${{ matrix.create_script }}

      - name: Smoke test installed CLIs
        shell: ${{ matrix.shell }}
        run: ${{ matrix.smoke_test }}
